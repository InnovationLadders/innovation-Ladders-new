<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" rx="24" fill="#0f172a"/>
  
  <defs>
    <radialGradient id="standGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="capShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>

  <!-- Ground Marble retail base stand -->
  <ellipse cx="400" cy="400" rx="250" ry="60" fill="url(#standGlow)" stroke="#334155" stroke-width="2"/>
  <ellipse cx="400" cy="408" rx="240" ry="50" fill="#020617" opacity="0.8"/>

  <!-- Cap Crown (The white baseball structure) -->
  <g transform="translate(400, 260)">
    <!-- Main Crown Dome -->
    <path d="M -130 0 C -130 -110, -80 -140, 0 -140 C 80 -140, 130 -110, 130 0" fill="url(#capShadow)" stroke="#94a3b8" stroke-width="2"/>
    <!-- Dome segments panel stitching -->
    <path d="M 0 -140 C -30 -80, -60 -30, -130 0" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M 0 -140 C 30 -80, 60 -30, 130 0" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M 0 -140 C 0 -60, 0 -20, 0 0" fill="none" stroke="#cbd5e1" stroke-width="2" />
    
    <!-- Red and white Saudi Shemagh crown ribbon or pattern side decoration -->
    <!-- We'll add shemagh red/white pattern lines to the left pane -->
    <g opacity="0.85">
      <!-- Repeating red geometric triangles represent Shemagh pattern on left crown section -->
      <path d="M -115 -40 L -90 -60 L -100 -20 Z" fill="#dc2626"/>
      <path d="M -90 -60 L -65 -80 L -75 -40 Z" fill="#dc2626"/>
      <path d="M -65 -80 L -40 -100 L -50 -60 Z" fill="#dc2626"/>
      <path d="M -40 -100 L -15 -115 L -25 -80 Z" fill="#dc2626"/>
      <!-- Small red dotted pattern -->
      <line x1="-120" y1="-25" x2="-80" y2="-65" stroke="#dc2626" stroke-width="3" stroke-dasharray="3,3"/>
      <line x1="-100" y1="-45" x2="-60" y2="-85" stroke="#dc2626" stroke-width="3" stroke-dasharray="3,3"/>
    </g>

    <!-- Black Iqal Band (The black woven cord structure at the base of the crown) -->
    <rect x="-132" y="-12" width="264" height="20" rx="6" fill="#1e293b" stroke="#000000" stroke-width="3"/>
    <!-- Double woven texture line on Iqal -->
    <line x1="-125" y1="-5" x2="125" y2="-5" stroke="#475569" stroke-width="2"/>
    <line x1="-125" y1="2" x2="125" y2="2" stroke="#0f172a" stroke-width="2.5"/>

    <!-- Cap Visor / Bill / Brim (The white cap front bill sticking forward) -->
    <!-- Curving and coming forward -->
    <path d="M -110 5 C -110 50, 110 50, 110 5 L 140 10 C 140 70, -140 70, -140 10 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
    <path d="M -115 15 C -40 60, 40 60, 115 15" fill="none" stroke="#e2e8f0" stroke-width="3" opacity="0.7"/>

    <!-- Embroidered center badge (National crest or symbol) -->
    <circle cx="0" cy="-60" r="18" fill="#1e293b" stroke="url(#capShadow)" stroke-width="1.5"/>
    <path d="M -6 -60 L 6 -60 M 0 -66 L 0 -54" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M -8 -50 C 0 -46, 0 -46, 8 -50" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  </g>

  <!-- Side luxury product specifications label -->
  <g transform="translate(60, 160)">
    <text x="0" y="0" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="28" font-weight="900">GulfHat™</text>
    <text x="0" y="30" fill="#ef4444" font-family="system-ui, sans-serif" font-size="12" font-weight="900" letter-spacing="1.5">PATENTED SAUDI HEADWEAR</text>
    <text x="0" y="70" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="500">
      <tspan x="0" dy="0">● White baseball cap layout</tspan>
      <tspan x="0" dy="22">● Saudi red/white shemagh elements</tspan>
      <tspan x="0" dy="22">● Integrated black iqal border strap</tspan>
    </text>
  </g>
</svg>
