<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" rx="24" fill="#111827"/>
  
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#701a75" />
    </linearGradient>
  </defs>

  <!-- Side Navigation Workspace Panel -->
  <g transform="translate(30, 30)">
    <!-- Sidebar background -->
    <rect width="180" height="440" rx="16" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="10" fill="#a855f7" />
    <text x="50" y="34" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="900">Odoo ERP</text>
    
    <!-- Sidebar links mock -->
    <rect x="15" y="70" width="150" height="28" rx="6" fill="#701a75" />
    <text x="30" y="88" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">📌 Dashboard</text>
    <text x="30" y="130" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="500">💼 Sales &amp; CRM</text>
    <text x="30" y="170" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="500">💰 Accounting</text>
    <text x="30" y="210" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="500">🎓 Academic Portal</text>
    <text x="30" y="250" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="500">📦 Inventory Control</text>
    <text x="30" y="290" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="500">👥 Human Resources</text>

    <!-- Bottom system status online indicator -->
    <circle cx="35" cy="410" r="5" fill="#10b981" />
    <text x="48" y="413" fill="#10b981" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">INTEGRATED OK</text>
  </g>

  <!-- Main Analytics Area Mockup -->
  <g transform="translate(230, 30)">
    <rect width="540" height="440" rx="16" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
    
    <!-- Header top stats -->
    <text x="30" y="40" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="20" font-weight="900">Performance Summary</text>
    <text x="30" y="60" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="12">Innovation Ladders customized enterprise statistics panel</text>

    <g transform="translate(30, 100)">
      <!-- Analytics Grid Card 1 -->
      <rect width="140" height="80" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="15" y="25" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">TOTAL REVENUE</text>
      <text x="15" y="55" fill="#34d399" font-family="system-ui, sans-serif" font-size="20" font-weight="900">$2.4M</text>

      <!-- Analytics Grid Card 2 -->
      <rect x="165" width="140" height="80" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="180" y="25" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">STUDENTS ENROLLED</text>
      <text x="180" y="55" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="20" font-weight="900">12,850</text>

      <!-- Analytics Grid Card 3 -->
      <rect x="330" width="140" height="80" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="345" y="25" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">ACTIVE INVOICES</text>
      <text x="345" y="55" fill="#a855f7" font-family="system-ui, sans-serif" font-size="20" font-weight="900">98.5%</text>
    </g>

    <!-- Main Chart Widget - Spline sales tracker -->
    <g transform="translate(30, 210)">
      <rect width="470" height="200" rx="12" fill="#111827" stroke="#374151" stroke-width="1"/>
      <text x="20" y="30" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">Organizational Growth Index</text>
      
      <!-- Graph grids -->
      <line x1="40" y1="60" x2="430" y2="60" stroke="#1f2937" stroke-width="1"/>
      <line x1="40" y1="100" x2="430" y2="100" stroke="#1f2937" stroke-width="1"/>
      <line x1="40" y1="140" x2="430" y2="140" stroke="#1f2937" stroke-width="1"/>
      
      <!-- splines -->
      <path d="M 40 140 Q 120 120, 200 80 T 360 50 T 430 40" fill="none" stroke="url(#purpleGrad)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M 40 110 Q 120 100, 200 130 T 360 90 T 430 70" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="3,3" stroke-linecap="round"/>
      
      <!-- Spline nodes -->
      <circle cx="200" cy="80" r="5" fill="#a855f7" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="360" cy="50" r="5" fill="#a855f7" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="430" cy="40" r="6" fill="#ec4899" stroke="#ffffff" stroke-width="2" />
      
      <circle cx="200" cy="130" r="4" fill="#0ea5e9" />
      <circle cx="360" cy="90" r="4" fill="#0ea5e9" />
    </g>
  </g>
</svg>
