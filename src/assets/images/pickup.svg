<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" rx="24" fill="#0f172a"/>
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Subtle tech background lines -->
  <path d="M 50 100 L 750 100 M 50 400 L 750 400" stroke="#1e293b" stroke-width="2" stroke-dasharray="10, 10"/>
  <circle cx="400" cy="250" r="180" fill="url(#accentGrad)" />

  <!-- Wall structure mockup on the right side -->
  <g transform="translate(420, 100)">
    <!-- Limestone Wall -->
    <rect x="0" y="0" width="300" height="300" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="10" y="20" width="280" height="80" rx="8" fill="#334155" opacity="0.3"/>
    <rect x="10" y="110" width="280" height="80" rx="8" fill="#334155" opacity="0.3"/>
    <rect x="10" y="200" width="280" height="80" rx="8" fill="#334155" opacity="0.3"/>
    
    <!-- Mounted Metal Cabinet -->
    <rect x="60" y="40" width="180" height="220" rx="12" fill="#020617" stroke="#38bdf8" stroke-width="4" />
    <rect x="80" y="60" width="140" height="130" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
    <!-- Touch screen interactive display -->
    <rect x="90" y="70" width="120" height="80" rx="2" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5"/>
    <path d="M110 105 L 140 105 M 110 115 L 170 115" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <path d="M110 125 L 190 125" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <!-- Simulated QR scanner screen area -->
    <rect x="135" y="160" width="30" height="20" rx="2" fill="#22c55e" opacity="0.8"/>
    <!-- Sleek handle bar lock -->
    <line x1="220" y1="110" x2="220" y2="170" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Title / Explanatory text vector panel -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="280" height="220" rx="16" fill="#1e293b" opacity="0.9" stroke="#334155" stroke-width="1.5"/>
    <text x="30" y="55" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="1">PickUp</text>
    <text x="30" y="90" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" tracking="2">SMART DELIVERY BOX</text>
    <text x="30" y="130" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="500">
      <tspan x="30" dy="0">● Patented smart wall elevator</tspan>
      <tspan x="30" dy="22">● QR-code secure access</tspan>
      <tspan x="30" dy="22">● Real-time status notifications</tspan>
      <tspan x="30" dy="22">● Direct food &amp; parcel receiver</tspan>
    </text>
  </g>

  <!-- Safe secure shield indicator badge on top -->
  <g transform="translate(360, 40)">
    <circle cx="40" cy="40" r="24" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <path d="M33 33 L40 26 L47 33 L47 45 C47 52, 40 56, 40 56 C40 56, 33 52, 33 45 Z" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linejoin="round"/>
    <path d="M37 41 L40 44 L45 37" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
