<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" rx="24" fill="#090514"/>
  
  <defs>
    <radialGradient id="hologramGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#090514" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="laserBeam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Big circular hologram glow background -->
  <circle cx="400" cy="220" r="220" fill="url(#hologramGlow)" />
  
  <!-- Laser Projector Base Pedestal -->
  <g transform="translate(320, 380)">
    <!-- Metallic Pedestal Structure -->
    <path d="M 10 30 L 150 30 L 130 90 L 30 90 Z" fill="#1e1b4b" stroke="#6366f1" stroke-width="2.5" />
    <!-- Glowing Laser Aperture -->
    <ellipse cx="80" cy="30" rx="60" ry="12" fill="#ec4899" />
    <ellipse cx="80" cy="30" rx="40" ry="8" fill="#38bdf8" />
    <!-- Decorative side patterns -->
    <line x1="40" y1="55" x2="120" y2="55" stroke="#4f46e5" stroke-width="2"/>
    <line x1="50" y1="70" x2="110" y2="70" stroke="#4f46e5" stroke-width="2"/>
  </g>

  <!-- Holographic Floating Laser Rays -->
  <polygon points="400,100 340,410 460,410" fill="url(#laserBeam)" />

  <!-- Dolly: The Holographic Dolphin Jumping (Sleek sci-fi vector outline) -->
  <g transform="translate(400, 200)">
    <!-- Dolphin Body Outer Mesh Paths -->
    <path d="M -90 40 C -70 20, -50 -20, 0 -40 C 40 -50, 90 -20, 110 0 C 120 10, 100 15, 80 15 C 60 15, 45 5, 20 0 C -25 -5, -60 20, -90 40 Z" fill="none" stroke="#22d3ee" stroke-width="4.5" stroke-linecap="round" filter="drop-shadow(0px 0px 8px #06b6d4)"/>
    
    <!-- Dolphin Snout and Fins -->
    <path d="M 110 0 C 120 -5, 125 10, 115 15 C 105 18, 90 12, 80 15" fill="none" stroke="#22d3ee" stroke-width="3.5" />
    <path d="M 10 -25 C 20 -50, 25 -50, 15 -24" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" />
    <path d="M 2 0 C -15 30, -5 30, 0 1" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" />
    
    <!-- Tail fin -->
    <path d="M -90 40 C -120 45, -115 25, -110 15 C -105 10, -95 25, -90 40 Z" fill="none" stroke="#e879f9" stroke-width="3.5" stroke-linejoin="round" />

    <!-- Scientific data analytics and targeting lines overlay (Holographic effect) -->
    <circle cx="20" cy="-10" r="50" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
    <line x1="-130" y1="0" x2="130" y2="0" stroke="#f472b6" stroke-width="1" stroke-dasharray="8,8" opacity="0.4"/>
    <circle cx="100" cy="5" r="3" fill="#22d3ee" />
    <circle cx="-100" cy="20" r="3" fill="#e879f9" />
  </g>

  <!-- Side text description -->
  <g transform="translate(60, 80)">
    <rect x="-10" y="-10" width="230" height="150" rx="12" fill="#1e1b4b" opacity="0.6" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="10" y="25" fill="#f472b6" font-family="system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="1">ProAds 3D</text>
    <text x="10" y="50" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="12" font-weight="900">INTERACTIVE ENGAGEMENT</text>
    <text x="10" y="85" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">
      <tspan x="10" dy="0">● Holographic Dolly Show</tspan>
      <tspan x="10" dy="20">● Smart Laser 3D project</tspan>
      <tspan x="10" dy="20">● Integrated retail display</tspan>
    </text>
  </g>
</svg>
